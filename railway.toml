[build]
builder = "NIXPACKS"
buildCommand = "cd backend && npm install && npm run build && cd ../frontend && npm install && npm run build && cp -r dist ../backend/dist/public"

[deploy]
startCommand = "cd backend && npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
