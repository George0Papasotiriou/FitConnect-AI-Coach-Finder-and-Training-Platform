[phases.setup]
nixPkgs = ["nodePackages.pnpm", "nodejs_20"]

[phases.build]
cmds = [
  "cd backend && npm install && npm run build",
  "cd frontend && npm install && npm run build",
  "mkdir -p backend/dist/public",
  "cp -r frontend/dist/* backend/dist/public/"
]

[start]
cmd = "cd backend && npm start"
